<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&family=Orbitron:wght@400;700&family=Caveat:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-default: linear-gradient(145deg, #EEF2FF 0%, #E0E7FF 35%, #DBEAFE 65%, #F0FDF4 100%);
  --surface: rgba(255,255,255,0.72);
  --surface-dark: rgba(255,255,255,0.55);
  --border: rgba(99,102,241,0.13);
  --border-focus: rgba(99,102,241,0.4);
  --text-primary: #1E1B4B;
  --text-secondary: #6366F1;
  --text-muted: #94A3B8;
  --accent: #6366F1;
  --accent2: #8B5CF6;
  --accent-glow: rgba(99,102,241,0.35);
  --accent-light: rgba(99,102,241,0.10);
  --success: #10B981;
  --danger: #EF4444;
  --warn: #F59E0B;
  --shadow: 0 8px 32px rgba(99,102,241,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 20px 60px rgba(99,102,241,0.18), 0 4px 16px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font-ui: 'Inter', system-ui, sans-serif;
  --font-timer: 'Space Mono', monospace;
  --trans: 200ms cubic-bezier(0.4,0,0.2,1);
  --trans-spring: 300ms cubic-bezier(0.34,1.56,0.64,1);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100vh;
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--text-primary);
  overflow-x: hidden;
  transition: background 0.5s ease;
}

/* ── Background ── */
#bg-wrap {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg-default);
  background-size: cover;
  background-position: center;
  transition: all 0.5s ease;
}
#bg-wrap.has-image::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(238,242,255,0.45);
  backdrop-filter: blur(2px);
}

/* ── App Shell ── */
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 48px;
  gap: 16px;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
header {
  width: 100%;
  max-width: 620px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}
.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 6px;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: logo-pulse 2.5s ease-in-out infinite;
}
@keyframes logo-pulse {
  0%,100%{ transform:scale(1); box-shadow:0 0 0 0 var(--accent-glow); }
  50%    { transform:scale(1.3); box-shadow:0 0 0 5px rgba(99,102,241,0); }
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-light);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  color: var(--accent);
  transition: all var(--trans-spring);
  position: relative;
  overflow: hidden;
}
.icon-btn::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at center, rgba(99,102,241,0.35) 0%, transparent 70%);
  opacity:0; transition: opacity 0.3s;
}
.icon-btn:hover { transform: scale(1.15) rotate(-8deg); background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 16px var(--accent-glow); }
.icon-btn:hover::after { opacity:1; }
.icon-btn:active { transform: scale(0.92); }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: rgba(99,102,241,0.08);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
}
.tab-btn {
  background: none; border: none;
  padding: 7px 18px;
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  border-radius: 100px;
  cursor: pointer;
  transition: all var(--trans-spring);
  position: relative;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tab-btn:hover:not(.active) { color: var(--accent); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
  transform: scale(1.03);
}

/* ══════════════════════════════
   MAIN CARD
══════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px 28px;
  width: 100%;
  max-width: 620px;
  backdrop-filter: blur(24px);
  box-shadow: var(--shadow-lg);
  transition: all 0.3s ease;
}
.card:hover { box-shadow: 0 24px 72px rgba(99,102,241,0.16), 0 4px 20px rgba(0,0,0,0.08); }

/* ══════════════════════════════
   TIMER PRESETS
══════════════════════════════ */
.presets {
  display: flex; gap: 8px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.preset-btn {
  background: var(--accent-light);
  border: 1.5px solid rgba(99,102,241,0.2);
  color: var(--accent);
  font-family: var(--font-ui);
  font-size: 12px; font-weight: 700;
  padding: 7px 16px;
  border-radius: 100px;
  cursor: pointer;
  transition: all var(--trans-spring);
  letter-spacing: 0.05em;
  position: relative; overflow: hidden;
}
.preset-btn::before {
  content:''; position:absolute; inset:0;
  background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.25s ease;
  z-index:0;
}
.preset-btn span { position: relative; z-index:1; }
.preset-btn:hover { color:#fff; border-color:var(--accent); box-shadow:0 4px 16px var(--accent-glow); transform:translateY(-3px); }
.preset-btn:hover::before { transform:scaleX(1); }
.preset-btn:active { transform:translateY(-1px) scale(0.96); }
.preset-btn.active-preset { background: var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 16px var(--accent-glow); }

/* ══════════════════════════════
   PROGRESS RING + DISPLAY
══════════════════════════════ */
.ring-wrap {
  position: relative;
  width: min(280px, 70vw);
  height: min(280px, 70vw);
  margin: 0 auto 8px;
}
.progress-ring {
  position: absolute; inset:0;
  transform: rotate(-90deg);
  width:100%; height:100%;
}
.ring-track {
  fill: none;
  stroke: rgba(99,102,241,0.08);
  stroke-width: 3;
}
.ring-bg-tick {
  fill:none;
  stroke: rgba(99,102,241,0.05);
  stroke-width:1;
}
.ring-fill {
  fill: none;
  stroke: url(#ringGradient);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 804.24; /* 2 * PI * 128 */
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.3s linear;
  filter: drop-shadow(0 0 6px rgba(99,102,241,0.5));
}
.ring-fill.ending { stroke: url(#ringGradientDanger); filter:drop-shadow(0 0 8px rgba(239,68,68,0.6)); }
.ring-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 4px;
}
.time-digits {
  font-family: var(--font-timer);
  font-size: clamp(52px, 15vw, 80px);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1;
  transition: font-family 0.3s ease, color 0.3s ease, transform 0.3s ease;
  user-select: none;
}
.time-digits.running { animation: breathe 3s ease-in-out infinite; }
.time-digits.ending { color: var(--danger); animation: urgent 0.7s ease-in-out infinite; }
@keyframes breathe {
  0%,100%{ transform:scale(1); opacity:1; }
  50%    { transform:scale(0.98); opacity:0.9; }
}
@keyframes urgent {
  0%,100%{ opacity:1; }
  50%    { opacity:0.45; }
}
.cs-digits {
  font-family: var(--font-timer);
  font-size: clamp(16px,4vw,22px);
  color: var(--text-muted);
  letter-spacing: 0.05em;
  transition: font-family 0.3s ease;
}
.time-label-small {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-secondary); margin-top: 2px;
}

/* ══════════════════════════════
   CONTROLS
══════════════════════════════ */
.controls {
  display: flex; gap: 10px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 7px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.05em;
  cursor: pointer;
  padding: 13px 26px;
  position: relative; overflow: hidden;
  transition: all var(--trans-spring);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff; min-width: 140px;
  box-shadow: 0 6px 20px var(--accent-glow);
}
.btn-primary:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 10px 28px var(--accent-glow); }
.btn-primary:active { transform:translateY(-1px) scale(0.97); }
.btn-secondary {
  background: rgba(99,102,241,0.08);
  border: 1.5px solid var(--border);
  color: var(--accent);
}
.btn-secondary:hover { background:rgba(99,102,241,0.16); transform:translateY(-2px) scale(1.04); box-shadow:0 4px 14px rgba(99,102,241,0.15); }
.btn-secondary:active { transform:scale(0.95); }
.btn-danger {
  background: rgba(239,68,68,0.08);
  border: 1.5px solid rgba(239,68,68,0.2);
  color: var(--danger);
}
.btn-danger:hover { background:rgba(239,68,68,0.15); transform:translateY(-2px); box-shadow:0 4px 14px rgba(239,68,68,0.2); }
.btn-danger:active { transform:scale(0.95); }
.btn-focus {
  background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
  color: #C7D2FE;
  border:none;
}
.btn-focus:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 24px rgba(30,27,75,0.4); }
.btn-focus:active { transform:scale(0.95); }

/* ══════════════════════════════
   FOCUS MODE (全画面)
══════════════════════════════ */
#focus-overlay {
  position: fixed; inset:0; z-index:200;
  background: #06060F;
  display: flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 16px;
  opacity:0; pointer-events:none;
  transition: opacity 0.5s ease;
}
#focus-overlay.active { opacity:1; pointer-events:all; }
.focus-hint {
  font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(199,210,254,0.3); margin-top:16px;
}
.focus-label {
  font-size:13px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  color:rgba(199,210,254,0.5);
}
#focus-time {
  font-family: var(--font-timer);
  font-size: clamp(80px, 22vw, 160px);
  font-weight:700; letter-spacing:-0.03em; line-height:1;
  color: #E0E7FF;
  animation: focus-breathe 4s ease-in-out infinite;
  text-shadow: 0 0 80px rgba(99,102,241,0.4);
}
@keyframes focus-breathe {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:0.85; transform:scale(0.97); }
}
.focus-ring-wrap {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.focus-ring-svg { width:min(90vmin,600px); height:min(90vmin,600px); transform:rotate(-90deg); }
.focus-ring-track { fill:none; stroke:rgba(99,102,241,0.05); stroke-width:1.5; }
.focus-ring-fill { fill:none; stroke:url(#focusGradient); stroke-width:1.5; stroke-linecap:round; stroke-dasharray: 848.23; stroke-dashoffset: 0; transition:stroke-dashoffset 0.3s linear; filter:drop-shadow(0 0 8px rgba(99,102,241,0.4)); }
.focus-exit-btn {
  position:absolute; top:20px; right:20px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4); font-family:var(--font-ui); font-size:12px;
  font-weight:600; letter-spacing:0.1em; padding:8px 16px; border-radius:100px;
  cursor:pointer; transition:all 0.2s;
}
.focus-exit-btn:hover { background:rgba(255,255,255,0.12); color:#fff; }
.focus-controls { display:flex; gap:12px; z-index:1; }
.focus-ctrl {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.7); font-family:var(--font-ui); font-size:13px;
  font-weight:600; padding:11px 24px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all var(--trans-spring);
  display:flex; align-items:center; gap:7px;
}
.focus-ctrl:hover { background:rgba(255,255,255,0.14); color:#fff; transform:translateY(-2px); }
.focus-ctrl:active { transform:scale(0.95); }
.focus-ctrl.primary { background:rgba(99,102,241,0.35); border-color:rgba(99,102,241,0.5); color:#C7D2FE; }

/* ══════════════════════════════
   STUDY LOG CARD
══════════════════════════════ */
.log-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 24px;
  width: 100%; max-width: 620px;
  backdrop-filter: blur(24px);
  box-shadow: var(--shadow);
}
.log-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom: 16px;
}
.section-label {
  font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--text-muted);
  display:flex; align-items:center; gap:7px;
}
.section-label::before {
  content:''; display:block; width:3px; height:14px;
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  border-radius:2px;
}
.today-time {
  font-family: var(--font-timer);
  font-size: 36px; font-weight:700; letter-spacing:-0.02em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}
.today-sub { font-size:12px; color:var(--text-muted); margin-top:3px; }

/* ── Graph controls ── */
.graph-controls { display:flex; gap:6px; margin-bottom:14px; }
.graph-range-btn {
  background:none; border:1.5px solid var(--border);
  color:var(--text-muted); font-family:var(--font-ui); font-size:11px; font-weight:700;
  padding:5px 13px; border-radius:100px; cursor:pointer; letter-spacing:0.05em;
  transition:all var(--trans-spring);
}
.graph-range-btn:hover { border-color:var(--accent); color:var(--accent); transform:scale(1.06); }
.graph-range-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 3px 12px var(--accent-glow); }
.graph-canvas-wrap {
  width:100%; height:130px; position:relative;
}
#log-graph { width:100%; height:100%; display:block; }

.log-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; padding-top:14px;
  border-top:1px solid var(--border);
}
.streak-badge {
  display:flex; align-items:center; gap:6px;
  font-size:12px; font-weight:700; color:var(--warn);
  background:rgba(245,158,11,0.1); padding:5px 12px; border-radius:100px;
  border:1px solid rgba(245,158,11,0.2);
  transition: all var(--trans-spring);
}
.streak-badge:hover { transform:scale(1.05); }
.reset-log-btn {
  background:none; border:none; cursor:pointer;
  font-size:12px; font-weight:600; color:var(--text-muted);
  font-family:var(--font-ui); padding:5px 10px; border-radius:6px;
  transition:all 0.2s; letter-spacing:0.03em;
}
.reset-log-btn:hover { color:var(--danger); background:rgba(239,68,68,0.08); transform:scale(1.04); }

/* ══════════════════════════════
   SETTINGS PANEL (slide-in)
══════════════════════════════ */
#settings-panel {
  position:fixed; top:0; right:0; width:300px; height:100vh; z-index:150;
  background:rgba(255,255,255,0.92); border-left:1px solid var(--border);
  backdrop-filter:blur(32px); box-shadow:-8px 0 32px rgba(99,102,241,0.12);
  padding:24px 20px; overflow-y:auto;
  transform:translateX(110%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#settings-panel.open { transform:translateX(0); }
.settings-title {
  font-size:15px; font-weight:700; color:var(--text-primary);
  margin-bottom:24px; display:flex; align-items:center; justify-content:space-between;
}
.settings-close {
  background:none; border:none; cursor:pointer; color:var(--text-muted);
  font-size:20px; line-height:1; transition:all 0.2s; padding:2px 6px; border-radius:4px;
}
.settings-close:hover { color:var(--danger); transform:rotate(90deg); }
.settings-section { margin-bottom:24px; }
.settings-section-title {
  font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-muted); margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.settings-section-title::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* Font picker */
.font-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.font-card {
  background:var(--accent-light); border:1.5px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 10px 7px;
  cursor:pointer; transition:all var(--trans-spring);
  text-align:center;
}
.font-card:hover { border-color:var(--accent); transform:translateY(-2px) scale(1.03); box-shadow:0 4px 14px var(--accent-glow); }
.font-card.selected { border-color:var(--accent); background:rgba(99,102,241,0.15); box-shadow:0 0 0 2px rgba(99,102,241,0.2); }
.font-card .font-preview { font-size:20px; font-weight:700; line-height:1.2; color:var(--text-primary); margin-bottom:4px; }
.font-card .font-name { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); }

/* Size slider */
.size-slider-wrap { padding:4px 0; }
.size-slider {
  -webkit-appearance:none; appearance:none;
  width:100%; height:4px;
  background:rgba(99,102,241,0.15);
  border-radius:4px; cursor:pointer; outline:none;
}
.size-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:18px; height:18px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,0.2);
  transition:all 0.2s; cursor:pointer;
}
.size-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-top:6px; }

/* Bg section */
.bg-upload-btn {
  width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
  background:var(--accent-light); border:1.5px dashed rgba(99,102,241,0.3);
  border-radius:var(--radius-sm); padding:14px;
  color:var(--accent); font-family:var(--font-ui); font-size:13px; font-weight:600;
  cursor:pointer; transition:all var(--trans-spring);
  letter-spacing:0.03em;
}
.bg-upload-btn:hover { background:rgba(99,102,241,0.15); border-color:var(--accent); transform:scale(1.02); }
.bg-preview {
  margin-top:10px; width:100%; height:72px; border-radius:var(--radius-sm);
  background-size:cover; background-position:center;
  border:1px solid var(--border); display:none;
  position:relative; overflow:hidden;
}
.bg-preview.has-img { display:block; }
.bg-clear-btn {
  position:absolute; top:6px; right:6px;
  background:rgba(0,0,0,0.55); border:none; color:#fff; border-radius:50%;
  width:22px; height:22px; cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
}

/* ── Panel Visibility ── */
.panel { display:none; }
.panel.active { display:block; }

/* ── Settings Overlay ── */
#settings-overlay {
  position:fixed; inset:0; z-index:140;
  background:rgba(6,6,15,0.2); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
#settings-overlay.active { opacity:1; pointer-events:all; }

@media(max-width:480px){
  .card { padding:24px 18px 22px; border-radius:18px; }
  .controls { gap:8px; }
  .ctrl-btn { padding:12px 18px; font-size:12px; }
  .btn-primary { min-width:120px; }
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ringGradientDanger" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="focusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
</svg>

<div id="bg-wrap"></div>

<div id="app">

  <header>
    <span class="logo"><span class="logo-dot"></span>Focus</span>
    <div class="tabs">
      <button class="tab-btn active" id="tab-timer-btn" onclick="switchTab('timer')">タイマー</button>
      <button class="tab-btn" id="tab-sw-btn" onclick="switchTab('stopwatch')">ストップウォッチ</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="設定" onclick="openSettings()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.7"/>
          <path d="M16.2 12.3a1.4 1.4 0 0 0 .28 1.54l.05.05a1.7 1.7 0 1 1-2.4 2.4l-.05-.05a1.4 1.4 0 0 0-1.54-.28 1.4 1.4 0 0 0-.85 1.28v.14a1.7 1.7 0 0 1-3.4 0v-.07a1.4 1.4 0 0 0-.92-1.28 1.4 1.4 0 0 0-1.54.28l-.05.05a1.7 1.7 0 1 1-2.4-2.4l.05-.05a1.4 1.4 0 0 0 .28-1.54 1.4 1.4 0 0 0-1.28-.85h-.14a1.7 1.7 0 0 1 0-3.4h.07a1.4 1.4 0 0 0 1.28-.92 1.4 1.4 0 0 0-.28-1.54l-.05-.05a1.7 1.7 0 1 1 2.4-2.4l.05.05a1.4 1.4 0 0 0 1.54.28h.07a1.4 1.4 0 0 0 .85-1.28v-.14a1.7 1.7 0 0 1 3.4 0v.07a1.4 1.4 0 0 0 .85 1.28 1.4 1.4 0 0 0 1.54-.28l.05-.05a1.7 1.7 0 1 1 2.4 2.4l-.05.05a1.4 1.4 0 0 0-.28 1.54v.07a1.4 1.4 0 0 0 1.28.85h.14a1.7 1.7 0 0 1 0 3.4h-.07a1.4 1.4 0 0 0-1.28.85Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="card panel active" id="panel-timer">
    <div class="presets" id="preset-group">
      <button class="preset-btn active-preset" onclick="setPreset(25*60,this)"><span>🍅 25分（ポモドーロ）</span></button>
      <button class="preset-btn" onclick="setPreset(5*60,this)"><span>☕ 5分（休憩）</span></button>
      <button class="preset-btn" onclick="setPreset(15*60,this)"><span>🌿 15分</span></button>
    </div>

    <div class="ring-wrap">
      <svg class="progress-ring" viewBox="0 0 280 280">
        <circle class="ring-track" cx="140" cy="140" r="128"/>
        <circle class="ring-fill" id="ring-fill" cx="140" cy="140" r="128"/>
      </svg>
      <div class="ring-center">
        <span class="time-digits" id="timer-digits">25:00</span>
        <span class="time-label-small" id="timer-label">集中モード</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-secondary" onclick="timerReset()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 1.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M2 12V8h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        リセット
      </button>
      <button class="ctrl-btn btn-primary" id="timer-toggle" onclick="timerToggle()">
        スタート
      </button>
      <button class="ctrl-btn btn-focus" onclick="enterFocusMode()">
        集中モード
      </button>
    </div>
  </div>

  <div class="card panel" id="panel-stopwatch">
    <div class="ring-wrap" style="margin-top:18px">
      <svg class="progress-ring" viewBox="0 0 280 280">
        <circle class="ring-track" cx="140" cy="140" r="128"/>
      </svg>
      <div class="ring-center">
        <span class="time-digits" id="sw-digits">00:00</span>
        <span class="cs-digits" id="sw-cs">.00</span>
        <span class="time-label-small">経過時間</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-secondary" onclick="swReset()">
        リセット
      </button>
      <button class="ctrl-btn btn-primary" id="sw-toggle" onclick="swToggle()">
        スタート
      </button>
      <button class="ctrl-btn btn-focus" onclick="enterFocusMode()">
        集中モード
      </button>
    </div>
  </div>

  <div class="log-card">
    <div class="log-header">
      <span class="section-label">学習記録</span>
      <div style="text-align:right">
        <div class="today-time" id="log-today">0:00:00</div>
        <div class="today-sub">本日の学習時間</div>
      </div>
    </div>

    <div class="graph-controls">
      <button class="graph-range-btn active" onclick="setGraphRange(7,this)">7日間</button>
      <button class="graph-range-btn" onclick="setGraphRange(14,this)">14日間</button>
      <button class="graph-range-btn" onclick="setGraphRange(30,this)">30日間</button>
    </div>
    <div class="graph-canvas-wrap">
      <canvas id="log-graph"></canvas>
    </div>

    <div class="log-footer">
      <div class="streak-badge" id="streak-badge">🔥 1日連続</div>
      <button class="reset-log-btn" onclick="resetStudyLog()">記録をリセット</button>
    </div>
  </div>

</div>

<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-panel">
  <div class="settings-title">
    設定
    <button class="settings-close" onclick="closeSettings()">×</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">数字のフォント</div>
    <div class="font-grid" id="font-grid">
      <div class="font-card selected" data-font="'Space Mono', monospace" onclick="selectFont(this)">
        <div class="font-preview" style="font-family:'Space Mono',monospace">25:00</div>
        <div class="font-name">Mono</div>
      </div>
      <div class="font-card" data-font="'Orbitron', sans-serif" onclick="selectFont(this)">
        <div class="font-preview" style="font-family:'Orbitron',sans-serif">25:00</div>
        <div class="font-name">Digital</div>
      </div>
      <div class="font-card" data-font="'Playfair Display', serif" onclick="selectFont(this)">
        <div class="font-preview" style="font-family:'Playfair Display',serif">25:00</div>
        <div class="font-name">Serif</div>
      </div>
      <div class="font-card" data-font="'DM Sans', sans-serif" onclick="selectFont(this)">
        <div class="font-preview" style="font-family:'DM Sans',sans-serif">25:00</div>
        <div class="font-name">Sans</div>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">数字のサイズ</div>
    <div class="size-slider-wrap">
      <input type="range" min="60" max="140" value="100" class="size-slider" id="size-slider" oninput="updateSize(this.value)">
      <div class="size-label"><span>小</span><span id="size-value">100%</span><span>大</span></div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">背景画像</div>
    <button class="bg-upload-btn" onclick="document.getElementById('bg-file-input').click()">
      画像を選択
    </button>
    <input type="file" id="bg-file-input" accept="image/*" style="display:none" onchange="loadBgImage(event)">
    <div class="bg-preview" id="bg-preview">
      <button class="bg-clear-btn" onclick="clearBg(event)">×</button>
    </div>
  </div>
</div>

<div id="focus-overlay">
  <button class="focus-exit-btn" onclick="exitFocusMode()">終了</button>
  <div class="focus-ring-wrap">
    <svg class="focus-ring-svg" viewBox="0 0 280 280">
      <circle class="focus-ring-track" cx="140" cy="140" r="135"/>
      <circle class="focus-ring-fill" id="focus-ring-fill" cx="140" cy="140" r="135"/>
    </svg>
  </div>
  <span class="focus-label" id="focus-label">集中モード</span>
  <span id="focus-time">25:00</span>
  <div class="focus-controls">
    <button class="focus-ctrl" id="focus-reset-btn">リセット</button>
    <button class="focus-ctrl primary" id="focus-toggle-btn">一時停止</button>
  </div>
</div>

<script>
// アプリの状態
let activeTab = 'timer';
let timerDuration = 25 * 60;
let timerRemaining = 25 * 60;
let timerId = null;

let swTime = 0; 
let swId = null;

let totalStudyTime = 0; 
let graphDays = 7;

// タブ切り替え
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  
  if(tab === 'timer') {
    document.getElementById('tab-timer-btn').classList.add('active');
    document.getElementById('panel-timer').classList.add('active');
  } else {
    document.getElementById('tab-sw-btn').classList.add('active');
    document.getElementById('panel-stopwatch').classList.add('active');
  }
}

// タイマー機能
function updateTimerDisplay() {
  const mins = Math.floor(timerRemaining / 60).toString().padStart(2, '0');
  const secs = (timerRemaining % 60).toString().padStart(2, '0');
  const txt = `${mins}:${secs}`;
  document.getElementById('timer-digits').innerText = txt;
  document.getElementById('focus-time').innerText = txt;
  
  // リングの進捗
  const ring = document.getElementById('ring-fill');
  const fRing = document.getElementById('focus-ring-fill');
  const totalOffset = 804.24;
  const focusTotalOffset = 848.23;
  
  const pct = timerRemaining / timerDuration;
  ring.style.strokeDashoffset = totalOffset * (1 - pct);
  fRing.style.strokeDashoffset = focusTotalOffset * (1 - pct);
}

function setPreset(seconds, btn) {
  if(timerId) timerToggle();
  timerDuration = seconds;
  timerRemaining = seconds;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
  if(btn) btn.classList.add('active-preset');
  updateTimerDisplay();
}

function timerToggle() {
  const btn = document.getElementById('timer-toggle');
  const fBtn = document.getElementById('focus-toggle-btn');
  if(timerId) {
    clearInterval(timerId);
    timerId = null;
    btn.innerText = 'スタート';
    fBtn.innerText = '再開';
    document.getElementById('timer-digits').classList.remove('running');
  } else {
    btn.innerText = '一時停止';
    fBtn.innerText = '一時停止';
    document.getElementById('timer-digits').classList.add('running');
    timerId = setInterval(() => {
      if(timerRemaining > 0) {
        timerRemaining--;
        totalStudyTime++;
        updateStudyLog();
        updateTimerDisplay();
      } else {
        clearInterval(timerId);
        timerId = null;
        btn.innerText = 'スタート';
        alert('時間になりました！お疲れ様です！');
      }
    }, 1000);
  }
}

function timerReset() {
  if(timerId) timerToggle();
  timerRemaining = timerDuration;
  updateTimerDisplay();
}

// ストップウォッチ機能
function updateSwDisplay() {
  const mins = Math.floor(swTime / 6000).toString().padStart(2, '0');
  const secs = Math.floor((swTime % 6000) / 100).toString().padStart(2, '0');
  const cs = (swTime % 100).toString().padStart(2, '0');
  document.getElementById('sw-digits').innerText = `${mins}:${secs}`;
  document.getElementById('sw-cs').innerText = `.${cs}`;
}

function swToggle() {
  const btn = document.getElementById('sw-toggle');
  if(swId) {
    clearInterval(swId);
    swId = null;
    btn.innerText = 'スタート';
  } else {
    btn.innerText = '一時停止';
    swId = setInterval(() => {
      swTime++;
      if(swTime % 100 === 0) {
        totalStudyTime++;
        updateStudyLog();
      }
      updateSwDisplay();
    }, 10);
  }
}

function swReset() {
  if(swId) swToggle();
  swTime = 0;
  updateSwDisplay();
}

// 集中モード
function enterFocusMode() {
  document.getElementById('focus-overlay').classList.add('active');
  document.getElementById('focus-label').innerText = activeTab === 'timer' ? '集中タイマー' : '経過時間';
  
  // 連動設定
  document.getElementById('focus-toggle-btn').onclick = () => {
    if(activeTab === 'timer') timerToggle(); else swToggle();
    document.getElementById('focus-toggle-btn').innerText = (timerId || swId) ? '一時停止' : '再開';
  };
  document.getElementById('focus-reset-btn').onclick = () => {
    if(activeTab === 'timer') timerReset(); else swReset();
  };
  document.getElementById('focus-toggle-btn').innerText = (timerId || swId) ? '一時停止' : '再開';
}

function exitFocusMode() {
  document.getElementById('focus-overlay').classList.remove('active');
}

// 設定機能
function openSettings() {
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('settings-overlay').classList.add('active');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('active');
}

function selectFont(card) {
  document.querySelectorAll('.font-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const font = card.getAttribute('data-font');
  document.documentElement.style.setProperty('--font-timer', font);
}

function updateSize(val) {
  document.getElementById('size-value').innerText = val + '%';
  document.getElementById('timer-digits').style.transform = `scale(${val/100})`;
  document.getElementById('sw-digits').style.transform = `scale(${val/100})`;
}

function loadBgImage(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const url = event.target.result;
      document.getElementById('bg-wrap').style.backgroundImage = `url(${url})`;
      document.getElementById('bg-wrap').classList.add('has-image');
      document.getElementById('bg-preview').style.backgroundImage = `url(${url})`;
      document.getElementById('bg-preview').classList.add('has-img');
    };
    reader.readAsDataURL(file);
  }
}

function clearBg(e) {
  e.stopPropagation();
  document.getElementById('bg-wrap').style.backgroundImage = '';
  document.getElementById('bg-wrap').classList.remove('has-image');
  document.getElementById('bg-preview').style.backgroundImage = '';
  document.getElementById('bg-preview').classList.remove('has-img');
  document.getElementById('bg-file-input').value = '';
}

// 学習記録・グラフ機能
function updateStudyLog() {
  const hrs = Math.floor(totalStudyTime / 3600);
  const mins = Math.floor((totalStudyTime % 3600) / 60).toString().padStart(2, '0');
  const secs = (totalStudyTime % 60).toString().padStart(2, '0');
  document.getElementById('log-today').innerText = `${hrs}:${mins}:${secs}`;
  drawGraph();
}

function setGraphRange(days, btn) {
  graphDays = days;
  document.querySelectorAll('.graph-range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawGraph();
}

function resetStudyLog() {
  if(confirm('本日の記録をリセットしますか？')) {
    totalStudyTime = 0;
    updateStudyLog();
  }
}

function drawGraph() {
  const canvas = document.getElementById('log-graph');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  // 簡易的なレスポンシブ対応
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = 130;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // ダミーデータ（今日だけリアルタイム連動）
  const data = Array(graphDays).fill(10); 
  data[data.length - 1] = Math.min(100, 10 + (totalStudyTime / 10)); // 今日

  const padding = 20;
  const colWidth = (canvas.width - padding * 2) / graphDays;
  
  // グリッド線
  ctx.strokeStyle = 'rgba(99,102,241,0.06)';
  ctx.lineWidth = 1;
  for(let i=0; i<4; i++) {
    let y = padding + (canvas.height - padding * 2) * (i / 3);
    ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(canvas.width - padding, y); ctx.stroke();
  }

  // 棒グラフを描画
  data.forEach((val, i) => {
    const x = padding + i * colWidth + colWidth * 0.15;
    const w = colWidth * 0.7;
    const h = (val / 100) * (canvas.height - padding * 2);
    const y = canvas.height - padding - h;
    
    // グラデーション
    let grad = ctx.createLinearGradient(0, y, 0, canvas.height - padding);
    if(i === data.length - 1) {
      grad.addColorStop(0, '#6366F1'); grad.addColorStop(1, '#8B5CF6');
    } else {
      grad.addColorStop(0, '#94A3B8'); grad.addColorStop(1, '#CBD5E1');
    }
    
    ctx.fillStyle = grad;
    // 角丸の棒
    ctx.beginPath();
    ctx.roundRect(x, y, w, Math.max(5, h), 4);
    ctx.fill();
  });
}

// 初期化
window.onload = () => {
  updateTimerDisplay();
  updateSwDisplay();
  updateStudyLog();
  window.addEventListener('resize', drawGraph);
};
</script>

</body>
</html>
